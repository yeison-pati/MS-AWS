version: '3.9'

services:
  discovery-service:
    build: ./discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"

  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      - discovery-service
    environment:
      - GIT_USERNAME=${GIT_USERNAME}
      - GIT_PASSWORD=${GIT_PASSWORD}

  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8080:8080"
    depends_on:
      - discovery-service
      - config-server
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8081"
    depends_on:
      - discovery-service
      - config-server
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka
      - USERS_HOST=${USERS_HOST}
      - USERS_PORT=${USERS_PORT}
      - USERS_DATABASE=${USERS_DATABASE}
      - USERS_USER=${USERS_USER}
      - USERS_PASSWORD=${USERS_PASSWORD}

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8082:8082"
    depends_on:
      - discovery-service
      - config-server
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka
      - ORDERS_HOST=${ORDERS_HOST}
      - ORDERS_PORT=${ORDERS_PORT}
      - ORDERS_DATABASE=${ORDERS_DATABASE}
      - ORDERS_USER=${ORDERS_USER}
      - ORDERS_PASSWORD=${ORDERS_PASSWORD}